<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMoney Wallet</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle, #001a2d, #000);
    color:white;
    text-align:center;
}

.container {
    max-width:400px;
    margin:auto;
    padding:10px;
}

.card {
    background:#001f33;
    border-radius:15px;
    padding:20px;
    margin:15px 0;
    box-shadow:0 0 20px #00d9ff, 0 0 40px #00d9ff;
}

button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d9ff,#00ffcc);
    cursor:pointer;
    font-weight:bold;
}

input {
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:none;
    width:100%;
    background:#222;
    color:white;
}

.balance {
    font-size:30px;
    font-family:'Orbitron', sans-serif;
    color:#00ff66;
    text-shadow:0 0 10px #00ff66, 0 0 25px #00ff66;
}

/* MENU */
.menu {
    display:flex;
    gap:5px;
}

.menu button {
    flex:1;
}

/* GRID */
.shop-grid {
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:10px;
}

.product {
    background:#111;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 10px #00ffc8;
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.product:hover {
    transform:scale(1.05);
    transition:0.3s;
}

.btn-vip {
    background: linear-gradient(90deg, gold, red);
    box-shadow:0 0 10px gold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
<div class="card">
    <img src="logo.png" width="80">
    <h2>GreenMoney Wallet</h2>

    <input type="text" id="user" placeholder="ID">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<!-- MENU -->
<div class="menu">
    <button onclick="showMenu('profil')">👤 Profil</button>
    <button onclick="showMenu('tugas')">📋 Tugas</button>
    <button onclick="showMenu('shop')">🛍️ Shop</button>
</div>

<!-- PROFIL -->
<div id="menuProfil">

<div class="card">
    <button onclick="logout()">Logout</button>
</div>

<div class="card">
    <img src="logo.png" width="80">
    <h2>GreenCoin</h2>
    <div class="balance">Rp 100.000.000</div>
</div>

<div class="card">
    <button>Data Akun</button>
    <button>Deposit</button>
    <button>Tarik</button>
</div>

</div>

<!-- TUGAS -->
<div id="menuTugas" style="display:none;">
<div class="card">
<h3>📋 Menu Tugas</h3>

<div class="shop-grid">

<div class="product">
<p>📌 Tugas 1</p>
<button onclick="tugas(1)">+Rp5.000</button>
</div>

<div class="product">
<p>📌 Tugas 2</p>
<button onclick="tugas(2)">+Rp10.000</button>
</div>

<div class="product">
<p>📌 Tugas 3</p>
<button onclick="tugas(3)">+Rp15.000</button>
</div>

<div class="product">
<p>👑 Tugas 4 VIP</p>
<button class="btn-vip" onclick="tugas(4)">+Rp50.000</button>
</div>

<div class="product">
<p>👑 Tugas 5 VIP</p>
<button class="btn-vip" onclick="tugas(5)">+Rp100.000</button>
</div>

</div>
</div>
</div>

<!-- SHOP -->
<div id="menuShop" style="display:none;">
<div class="card">
<h3>🛍️ Marketplace</h3>

<div class="shop-grid">

<div class="product">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<p>Sepatu Sport</p>
<button onclick="beli()">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
<p>Headset</p>
<button onclick="beli()">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1526178613658-3f1622045557">
<p>Jam Tangan</p>
<button onclick="beli()">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<p>Tas Fashion</p>
<button onclick="beli()">Beli</button>
</div>

</div>
</div>
</div>

</div>

<script>

function login(){
    if(user.value=="admin" && pass.value=="1234"){
        loginPage.style.display="none";
        app.style.display="block";
    } else {
        alert("Login salah");
    }
}

function logout(){
    app.style.display="none";
    loginPage.style.display="block";
}

function showMenu(menu){
    document.getElementById("menuProfil").style.display="none";
    document.getElementById("menuTugas").style.display="none";
    document.getElementById("menuShop").style.display="none";

    document.getElementById("menu"+menu.charAt(0).toUpperCase()+menu.slice(1)).style.display="block";
}

function tugas(n){
    alert("Kamu mengerjakan Tugas " + n);
}

function beli(){
    window.location.href="https://shopee.co.id";
}

</script>

</body>
</html>
