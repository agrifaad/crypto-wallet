  <!DOCTYPE html>
<html>
<head>
  <title>Crypto Wallet</title>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      color: #38bdf8;
      font-size: 40px;
    }

    p {
      color: #cbd5f5;
      font-size: 18px;
    }

    button {
      background-color: #38bdf8;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Crypto Wallet 🚀</h1>
<p>Selamat datang di website green money</p>

<button onclick="connectWallet()">
  Connect Wallet
</button>

<div id="wallet" style="display:none; margin-top:30px;">
  <h2>Saldo Anda 💰</h2>
  <p>Bitcoin: 0.45 BTC</p>
  <p>Ethereum: 2.1 ETH</p>
</div>

<script>
function connectWallet() {
  document.getElementById("wallet").style.display = "block";
}
</script>

</body>
</html>
