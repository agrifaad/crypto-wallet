<!DOCTYPE html>
<html lang="id">
<head>
    <title>GreenCoin</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #001a23;
            font-family: Arial;
            color: white;
        }

        /* NAV */
        .nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        .nav button {
            background: linear-gradient(to right, #00c6ff, #00ffcc);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* CARD */
        .card {
            background: #012b36;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 15px #00f0ff;
        }

        .header {
            text-align: center;
        }

        .title {
            font-size: 32px;
        }

        /* SALDO HIJAU */
        .saldo {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: bold;
            color: #00ff66;
            margin-top: 10px;
            letter-spacing: 2px;

            text-shadow:
                0 0 5px #00ff66,
                0 0 10px #00ff66,
                0 0 20px #00ff66,
                0 0 40px #00ff66;
        }

        /* DATA AKUN */
        .menu-content {
            display: none;
            margin-top: 10px;
        }

        /* BUTTON */
        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #00c6ff, #00ffcc);
            font-weight: bold;
        }

        /* SHOP */
        .shop {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item {
            width: 45%;
            background: #000;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 0 10px #00f0ff;
        }

        .item img {
            width: 100%;
            border-radius: 10px;
        }

        .harga {
            color: #00ff66;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
    <button>👤 Profil</button>
    <button>📋 Tugas</button>
    <button>🛍️ Shop</button>
    <button>⚙️ Setting</button>
</div>

<!-- HEADER -->
<div class="card header">
    <h1 class="title">GreenCoin</h1>
    <div class="saldo">Rp 100.000.000</div>
</div>

<!-- DATA AKUN -->
<div class="card">
    <div onclick="toggleData()">👁️ Data Akun</div>

    <div id="dataAkun" class="menu-content">
        <p>Nama<br>AGRIFA ALOKENIA GINTING</p>
        <p>No Rek<br>0896-9986-3373</p>
        <p>rek<br>DANA</p>
        <p style="color:gold;">ID<br>124532</p>

        <button>Deposit</button>
        <button>Tarik</button>
    </div>
</div>

<!-- SHOP / TUGAS -->
<div class="card">
    <div class="shop">

        <div class="item">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
            <p>Sepatu Sport</p>
            <p class="harga">Rp 150.000</p>
            <button>Beli</button>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1518444028785-8f0c4d94e6c3">
            <p>Headset</p>
            <p class="harga">Rp 300.000</p>
            <button>Beli</button>
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
            <p>Jam Tangan</p>
            <p class="harga">Rp 250.000</p>
            <button>Beli</button>
        </div>

    </div>
</div>

<script>
function toggleData() {
    var data = document.getElementById("dataAkun");

    if (data.style.display === "none") {
        data.style.display = "block";
    } else {
        data.style.display = "none";
    }
}
</script>

</body>
</html>
