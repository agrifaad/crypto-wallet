<!DOCTYPE html>
<html>
<head>
  <title>Green Money 💚</title>

  <style>
    body {
      background: linear-gradient(135deg, #1a1a1a, #3b2f00, #d4af37);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding-top: 40px;
    }

    h1 {
      color: gold;
      font-size: 42px;
      text-shadow: 0 0 10px gold;
    }

    .card {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      width: 320px;
      margin: 20px auto;
      box-shadow: 0 0 20px gold;
    }

    button {
      background: gold;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: orange;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>Green Money 💚</h1>

<!-- LOGIN -->
<div id="login">
  <h3>Login 🔐</h3>
  <input id="username" placeholder="ID"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Masuk</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- SALDO -->
  <div class="card">
    <h3>Saldo Anda 💰</h3>
    <p id="saldo">Rp 1.000.000</p>

    <button onclick="deposit()">Deposit 💳</button>
    <button onclick="tarik()">Tarik 💸</button>
    <button onclick="logout()">Logout 🚪</button>
  </div>

  <!-- DEPOSIT -->
  <div id="depositBox" class="card" style="display:none;">
    <h3>Deposit DANA</h3>
    <p>No: 0896-9986-3373</p>
    <p>Nama: GREEN MONEY</p>
  </div>

  <!-- TARIK -->
  <div id="tarikBox" class="card" style="display:none;">
    <h3>Tarik Saldo</h3>
    <p>Silakan hubungi admin untuk penarikan</p>
  </div>

  <!-- TUGAS -->
  <div class="card">
    <h3>Menu Tugas</h3>
    <p>✅ Tugas 1</p>
    <p>✅ Tugas 2</p>
    <p>✅ Tugas 3</p>
    <p>✅ Tugas 4</p>
    <p style="color: gold;">👑 Tugas 5 (VIP)</p>
  </div>

</div>

<script>

// LOGIN
function login(){
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";

    localStorage.setItem("login", "true");
  } else {
    document.getElementById("error").innerText = "ID / Password salah!";
  }
}

// AUTO LOGIN
window.onload = function(){
  if(localStorage.getItem("login") === "true"){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  }
}

// DEPOSIT
function deposit(){
  document.getElementById("depositBox").style.display = "block";
  document.getElementById("tarikBox").style.display = "none";
}

// TARIK
function tarik(){
  document.getElementById("tarikBox").style.display = "block";
  document.getElementById("depositBox").style.display = "none";
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
