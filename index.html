<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMoney Wallet</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle, #001a2d, #000);
    color:white;
    text-align:center;
}

.container { max-width:400px; margin:auto; padding:10px; }

.card {
    background:#001f33;
    border-radius:15px;
    padding:20px;
    margin:15px 0;
    box-shadow:0 0 20px #00d9ff;
}

button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d9ff,#00ffcc);
    font-weight:bold;
}

.shop-grid {
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:10px;
}

.product {
    background:#111;
    padding:10px;
    border-radius:12px;
    box-shadow:0 0 10px #00ffc8;
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:10px;
}

.price { color:#00ff66; font-weight:bold; }

.btn-vip {
    background:linear-gradient(90deg,gold,red);
    box-shadow:0 0 15px gold;
}

.btn-tugas {
    background:linear-gradient(90deg,#00d9ff,#00ffcc);
}
</style>
</head>

<body>

<div id="loginPage" class="container">
<div class="card">
<h2>Login</h2>
<input id="user" placeholder="ID">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="app" class="container" style="display:none;">

<div style="display:flex; gap:10px;">
<button onclick="showMenu('profil')">Profil</button>
<button onclick="showMenu('tugas')">Tugas</button>
<button onclick="showMenu('shop')">Shop</button>
<button onclick="showMenu('setting')">Setting</button>
</div>

<!-- PROFIL -->
<div id="menuProfil">
<div class="card">
<h3>Profil</h3>
<p>Saldo: Rp 100.000.000</p>
</div>
</div>

<!-- TUGAS -->
<div id="menuTugas" style="display:none;">
<div class="card">
<h3>Menu Tugas</h3>

<div class="shop-grid">
<div class="product"><p>Tugas 1</p><button class="btn-tugas" onclick="tugas()">Kerjakan</button></div>
<div class="product"><p>Tugas 2</p><button class="btn-tugas" onclick="tugas()">Kerjakan</button></div>
<div class="product"><p>Tugas 3</p><button class="btn-tugas" onclick="tugas()">Kerjakan</button></div>
<div class="product"><p>👑 Tugas 4 VIP</p><button class="btn-vip" onclick="tugas()">Kerjakan</button></div>
<div class="product"><p>👑 Tugas 5 VIP</p><button class="btn-vip" onclick="tugas()">Kerjakan</button></div>
</div>

</div>
</div>

<!-- SHOP -->
<div id="menuShop" style="display:none;">
<div class="card">
<h3>Marketplace</h3>

<div class="shop-grid">
<div class="product">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<p>Sepatu</p>
<div class="price">Rp 150.000</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
<p>Headset</p>
<div class="price">Rp 300.000</div>
</div>
</div>

</div>
</div>

<!-- SETTING -->
<div id="menuSetting" style="display:none;">
<div class="card"><h3>Setting</h3></div>
</div>

</div>

<script>
function login(){
    if(user.value=="admin" && pass.value=="1234"){
        loginPage.style.display="none";
        app.style.display="block";
    } else alert("Login salah");
}

function showMenu(menu){
    menuProfil.style.display="none";
    menuTugas.style.display="none";
    menuShop.style.display="none";
    menuSetting.style.display="none";

    if(menu=="profil") menuProfil.style.display="block";
    if(menu=="tugas") menuTugas.style.display="block";
    if(menu=="shop") menuShop.style.display="block";
    if(menu=="setting") menuSetting.style.display="block";
}

function tugas(){ alert("Tugas jalan"); }
</script>

</body>
</html>
