<!DOCTYPE html>
<html>
<head>
  <title>Green Money 💚</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 60px;
    }

    h1 { color: #38bdf8; }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 300px;
      margin: 20px auto;
      box-shadow: 0 0 20px rgba(56,189,248,0.3);
    }
  </style>
</head>

<body>

<h1>Green Money 💚</h1>

<!-- LOGIN -->
<div id="login">
  <input id="username" placeholder="ID"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<button id="btnWallet" onclick="connectWallet()" style="display:none;">
  Connect Wallet
</button>

<div id="wallet" style="display:none;">

  <div class="card">
    <h3>Saldo Anda</h3>
    <p>Bitcoin: <span id="btc">1000000</span></p>
    <p>Ethereum: <span id="eth">5000000</span></p>

    <button onclick="tambahSaldo()">Tambah Saldo</button>
    <button onclick="tampilRekening()">Isi Saldo</button>
  </div>

  <div id="rekening" class="card" style="display:none;">
    <h3>Transfer</h3>
    <p>No: <span id="rek">089699863373</span></p>
    <button onclick="copyRekening()">Copy</button>
  </div>

</div>

<script>

function login(){
  var user = document.getElementById("username").value;
  var pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234"){
    document.getElementById("login").style.display = "none";
    document.getElementById("btnWallet").style.display = "inline-block";
    localStorage.setItem("login","true");
  } else {
    document.getElementById("error").innerText = "Salah!";
  }
}

window.onload = function(){
  if(localStorage.getItem("login") === "true"){
    document.getElementById("login").style.display = "none";
    document.getElementById("btnWallet").style.display = "inline-block";
  }
}

function connectWallet(){
  document.getElementById("wallet").style.display = "block";
}

function tambahSaldo(){
  let btc = parseInt(document.getElementById("btc").innerText);
  let eth = parseInt(document.getElementById("eth").innerText);

  btc += 500000;
  eth += 1000000;

  document.getElementById("btc").innerText = btc;
  document.getElementById("eth").innerText = eth;
}

function tampilRekening(){
  document.getElementById("rekening").style.display = "block";
}

function copyRekening(){
  let rek = document.getElementById("rek").innerText;
  navigator.clipboard.writeText(rek);
  alert("Copied!");
}

</script>

</body>
</html>
