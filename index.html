<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMoney Wallet</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle, #001a2d, #000);
    color:white;
    text-align:center;
}

.container {
    max-width:400px;
    margin:auto;
    padding:10px;
}

.card {
    background:#001f33;
    border-radius:15px;
    padding:20px;
    margin:15px 0;
    box-shadow:0 0 20px #00d9ff;
}

button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d9ff,#00ffcc);
    cursor:pointer;
    font-weight:bold;
}

.balance {
    font-size:26px;
    color:#00ffcc;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<!-- MENU -->
<div style="display:flex; gap:10px;">
    <button onclick="showMenu('profil')" id="btnProfil">👤 Profil</button>
    <button onclick="showMenu('tugas')" id="btnTugas">📋 Tugas</button>
</div>

<!-- ================= PROFIL ================= -->
<div id="menuProfil">

    <div class="card">
        <button onclick="logout()">🔓 Logout</button>
    </div>

    <div class="card">

        <h3>GreenCoin</h3>

        <!-- TOGGLE ICON -->
        <div style="margin-bottom:10px;">
            <button onclick="toggleSaldo()">👁️ Lihat / Sembunyikan</button>
        </div>

        <!-- DATA AKUN -->
        <div id="dataAkun" style="text-align:left; font-size:14px;">

            <p><b>Nama:</b> AGRIFA ALOKENIA GINTING</p>
            <p><b>No Rek:</b> 089699863373</p>

            <p><b>Saldo:</b> 
                <span id="saldoText" class="balance">Rp 100.000</span>
            </p>

        </div>

        <button onclick="deposit()">💳 Deposit</button>
        <button onclick="tarik()">💸 Tarik</button>

    </div>

    <div class="card">
        <h3>NOTICE ⚠️</h3>
        <p style="font-size:12px;">
        Penyelesaian tugas hanya dari mentor anda<br><br>
        Ambil tugas di grup<br>
        Isi coin melalui transfer<br>
        Pilih tugas & kembali ke mentor<br>
        Segera lakukan penarikan setelah selesai
        </p>
    </div>

</div>

<!-- ================= TUGAS ================= -->
<div id="menuTugas" style="display:none;">

    <div class="card">
        <h3>Menu Tugas</h3>

        <button onclick="tugas()">📋 Tugas 1</button>
        <button onclick="tugas()">📋 Tugas 2</button>
        <button onclick="tugas()">📋 Tugas 3</button>
        <button onclick="tugas()">👑 Tugas VIP</button>

    </div>

</div>

</div>

<script>

// MENU SWITCH
function showMenu(menu){
    document.getElementById("menuProfil").style.display="none";
    document.getElementById("menuTugas").style.display="none";

    document.getElementById("menu" + capitalize(menu)).style.display="block";
}

function capitalize(text){
    return text.charAt(0).toUpperCase() + text.slice(1);
}

// TOGGLE SALDO (MODE BANK)
let visible = true;

function toggleSaldo(){
    let saldo = document.getElementById("saldoText");

    if(visible){
        saldo.innerText = "Rp ******";
        visible = false;
    } else {
        saldo.innerText = "Rp 100.000";
        visible = true;
    }
}

// ACTION
function deposit(){
    alert("Transfer ke DANA 089699863373 a.n AGRIFA");
}

function tarik(){
    alert("Hubungi mentor untuk penarikan");
}

function tugas(){
    window.location.href="https://t.me/robertelchico";
}

function logout(){
    alert("Logout berhasil");
}

</script>

</body>
</html>
