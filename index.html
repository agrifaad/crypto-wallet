<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMoney Wallet</title>

<!-- ICON -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #001a2d 0%, #000d1a 60%, #00081f 100%);
    color:white;
    text-align:center;
}

.container {
    max-width:400px;
    margin:auto;
    padding:10px;
}

.card {
    background:#001f33;
    border-radius:15px;
    padding:20px;
    margin:15px 0;
    box-shadow:0 0 20px #00d9ff;
}

button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00d9ff,#00ffcc);
    cursor:pointer;
    font-weight:bold;
}

button:hover {
    transform:scale(1.05);
    box-shadow:0 0 15px #00d9ff;
}

input {
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:none;
    width:85%;
    background:#001f33;
    color:#00d9ff;
}

.balance {
    font-size:26px;
    color:#00ffcc;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">

    <div class="card">
        <img src="logo.png" width="80" style="filter: drop-shadow(0 0 10px gold);">
        <h2 style="color:#00d9ff;">GreenMoney Wallet</h2>

        <input type="text" id="user" placeholder="👤 ID Pengguna"><br>
        <input type="password" id="pass" placeholder="🔒 Password"><br>

        <button onclick="login()">
            <i class="fas fa-sign-in-alt"></i> Login
        </button>
    </div>

</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

    <div class="card">
        <button onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <div class="card">
        <h3 style="display:flex;justify-content:center;align-items:center;gap:8px;">
            GreenCoin 
            <img src="vip.png" width="35">
        </h3>

        <div class="balance" id="saldo">Rp 100.000</div>

        <button onclick="deposit()">
            <i class="fas fa-wallet"></i> Deposit
        </button>

        <button onclick="tarik()">
            <i class="fas fa-money-bill-wave"></i> Tarik
        </button>
    </div>

    <div class="card">
        <h3>Menu Tugas</h3>

        <button onclick="tugas()"><i class="fas fa-tasks"></i> Tugas 1</button>
        <button onclick="tugas()"><i class="fas fa-tasks"></i> Tugas 2</button>
        <button onclick="tugas()"><i class="fas fa-tasks"></i> Tugas 3</button>
        <button onclick="tugas()"><i class="fas fa-crown"></i> Tugas VIP</button>
    </div>

    <div class="card">
        <h3>NOTICE ⚠️</h3>
        <p style="font-size:12px;">
        Penyelesaian tugas hanya dari mentor anda<br><br>
        Ambil tugas di grup<br>
        Isi coin melalui transfer<br>
        Pilih tugas & kembali ke mentor<br>
        Segera lakukan penarikan setelah selesai
        </p>
    </div>

</div>

<script>
let saldo = 100000;

function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("app").style.display="block";
    } else {
        alert("Login salah ❌");
    }
}

function logout(){
    document.getElementById("app").style.display="none";
    document.getElementById("loginPage").style.display="block";
}

function deposit(){
    document.getElementById("popupDeposit").style.display = "flex";
}
}

function tarik(){
    alert("Hubungi mentor untuk penarikan");
}

function tugas(){
    window.location.href="https://t.me/robertelchico";
}
</script>

</body>
</html>
