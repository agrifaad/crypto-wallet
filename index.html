<!DOCTYPE html>
<html>
<head>
  <title>Green Money</title>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #020617);
      font-family: Arial;
      color: white;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
      margin-top: 60px;
    }

    .container {
      max-width: 350px;
      margin: auto;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 20px;
      margin: 20px;
      box-shadow: 0 0 25px rgba(56,189,248,0.3);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      color: black;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .notif {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      padding: 10px 20px;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<h1>Green Money 💚</h1>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h2>Login 🔐</h2>
    <input id="username" placeholder="ID"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- WALLET -->
  <div id="wallet" class="hidden">

    <div class="card">
      <h2>Saldo Anda 💰</h2>
      <p>Bitcoin: <span id="btc"></span></p>
      <p>Ethereum: <span id="eth"></span></p>

      <button onclick="tambahSaldo()">Tambah Saldo 💸</button>
      <button onclick="tampilRekening()">Isi Saldo 💳</button>
      <button onclick="logout()">Logout 🚪</button>
    </div>

    <div id="rekening" class="card hidden">
      <h3>Transfer ke rekening</h3>
      <p>Bank: DANA</p>
      <p>No Rekening: <span id="rek">089699863373</span></p>
      <button onclick="copyRek()">Copy Rekening</button>
      <p>Nama: GREEN MONEY</p>
    </div>

  </div>

</div>

<div id="notif" class="notif">✔ Berhasil!</div>

<script>

// FORMAT
function format(n) {
  return "Rp " + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// NOTIF
function showNotif(text) {
  let n = document.getElementById("notif");
  n.innerText = text;
  n.style.display = "block";
  setTimeout(() => n.style.display = "none", 2000);
}

// LOGIN
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    localStorage.setItem("login", "true");
    document.getElementById("login").classList.add("hidden");
    document.getElementById("wallet").classList.remove("hidden");
    showNotif("Login berhasil!");
  } else {
    document.getElementById("error").innerText = "Salah!";
  }
}

// LOAD
window.onload = function() {
  let btc = parseInt(localStorage.getItem("btc")) || 1000000;
  let eth = parseInt(localStorage.getItem("eth")) || 5000000;

  document.getElementById("btc").innerText = format(btc);
  document.getElementById("eth").innerText = format(eth);

  if(localStorage.getItem("login") === "true") {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("wallet").classList.remove("hidden");
  }
}

// TAMBAH SALDO
function tambahSaldo() {
  let btc = parseInt(localStorage.getItem("btc")) || 1000000;
  let eth = parseInt(localStorage.getItem("eth")) || 5000000;

  btc += 500000;
  eth += 1000000;

  localStorage.setItem("btc", btc);
  localStorage.setItem("eth", eth);

  document.getElementById("btc").innerText = format(btc);
  document.getElementById("eth").innerText = format(eth);

  showNotif("Saldo bertambah!");
}

// REKENING
function tampilRekening() {
  document.getElementById("rekening").classList.remove("hidden");
}

// COPY
function copyRek() {
  let rek = document.getElementById("rek").innerText;
  navigator.clipboard.writeText(rek);
  showNotif("Rekening disalin!");
}

// LOGOUT
function logout() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
