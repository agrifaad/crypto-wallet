<!DOCTYPE html>
<html>
<head>
  <title>Crypto Wallet</title>

  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 80px;
    }

    h1 {
      color: #38bdf8;
      font-size: 40px;
    }

    p {
      color: #cbd5f5;
      font-size: 18px;
    }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
      width: 200px;
    }

    button {
      background-color: #38bdf8;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      width: 300px;
      box-shadow: 0 0 20px rgba(56,189,248,0.3);
    }
  </style>
</head>

<body>

<h1>Crypto Wallet TEST 🔥</h1>
<p>Selamat datang di Green Money 💚</p>

<!-- LOGIN -->
<div id="login">
  <h2>Login 🔐</h2>
  <input type="text" id="username" placeholder="Masukkan ID"><br><br>
  <input type="password" id="password" placeholder="Masukkan Password"><br><br>
  <button onclick="login()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- BUTTON -->
<button id="btnWallet" onclick="connectWallet()" style="display:none;">
  Connect Wallet
</button>

<!-- WALLET -->
<div id="wallet" style="display:none;">

  <div class="card">
    <h2>Saldo Anda 💰</h2>
    <p>Bitcoin: <span id="btc">1000000</span></p>
    <p>Ethereum: <span id="eth">5000000</span></p>

    <button onclick="tambahSaldo()">Tambah Saldo 💸</button>
    <button onclick="tampilRekening()">Isi Saldo 💳</button>
  </div>

  <div id="rekening" class="card" style="display:none;">
    <h3>Transfer ke rekening ini 💳</h3>
    <p>Bank: DANA</p>
    <p>No Rekening: <span id="rek">089699863373</span></p>
    <button onclick="copyRekening()">Copy Rekening 📋</button>
    <p>Nama: AGRIFA ALOKENIA GINTING</p>
  </div>

</div>

<script>

// 🔐 LOGIN
function login() {
  var user = document.getElementById("username").value;
  var pass = document.getElementById("password").value;

  if(user === "admin" && pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("btnWallet").style.display = "inline-block";

    localStorage.setItem("login", "true"); // simpan login
  } else {
    document.getElementById("error").innerText = "ID atau Password salah!";
  }
}

// 🔁 AUTO LOGIN
window.onload = function() {
  if(localStorage.getItem("login") === "true") {
    document.getElementById("login").style.display = "none";
    document.getElementById("btnWallet").style.display = "inline-block";
  }

  var btc = localStorage.getItem("btc");
  var eth = localStorage.getItem("eth");

  if(btc && eth) {
    document.getElementById("btc").innerText = formatRupiah(btc);
    document.getElementById("eth").innerText = formatRupiah(eth);
  }
}

// 💰 FORMAT RUPIAH
function formatRupiah(angka) {
  return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

// 🔗 CONNECT
function connectWallet() {
  document.getElementById("wallet").style.display = "block";

  var btc = document.getElementById("btc");
  var eth = document.getElementById("eth");

  btc.innerText = formatRupiah(btc.innerText.replace(/[^0-9]/g, ""));
  eth.innerText = formatRupiah(eth.innerText.replace(/[^0-9]/g, ""));
}

// ➕ TAMBAH SALDO
function tambahSaldo() {
  var btc = document.getElementById("btc");
  var eth = document.getElementById("eth");

  var btcValue = parseInt(btc.innerText.replace(/[^0-9]/g, ""));
  var ethValue = parseInt(eth.innerText.replace(/[^0-9]/g, ""));

  btcValue += 500000;
  ethValue += 1000000;

  btc.innerText = formatRupiah(btcValue);
  eth.innerText = formatRupiah(ethValue);

  localStorage.setItem("btc", btcValue);
  localStorage.setItem("eth", ethValue);
}

// 💳 TAMPIL REKENING
function tampilRekening() {
  document.getElementById("rekening").style.display = "block";
}

// 📋 COPY
function copyRekening() {
  var rek = document.getElementById("rek").innerText;
  navigator.clipboard.writeText(rek);
  alert("Nomor rekening berhasil disalin!");
}

</script>

</body>
</html>
