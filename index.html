<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenMoney Wallet</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#001a2d;
    color:white;
    text-align:center;
}

/* NOTIFIKASI */
.marquee{
    background:black;
    color:yellow;
    padding:8px;
    font-weight:bold;
}

/* LOGIN */
#loginPage{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#e5e5e5;
    padding:20px;
    border-radius:8px;
    width:260px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    background:#222;
    color:white;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#1eb6d9;
    border:none;
    color:white;
}

/* APP */
.container{max-width:400px;margin:auto;padding:10px;}

.card{
    background:#002b45;
    padding:20px;
    border-radius:10px;
    margin:10px 0;
    box-shadow:0 0 10px cyan;
}

.balance{
    font-size:28px;
    color:#00ff66;
}

/* MENU */
.menu{display:flex;gap:5px;}
.menu button{flex:1;padding:10px;background:#00c2ff;border:none;color:white;}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.product{
    background:#111;
    padding:10px;
    border-radius:10px;
}

.product img{
    width:100%;
    height:100px;
    object-fit:cover;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.box{
    background:#111;
    padding:20px;
    border-radius:10px;
    width:90%;
    max-width:300px;
}

.box input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#222;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="marquee">
<marquee>🚀 Kerjakan tugas & dapatkan komisi sekarang!!!</marquee>
</div>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<input type="text" id="user" placeholder="ID">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" class="container" style="display:none;">

<div class="menu">
<button onclick="menu('profil')">Profil</button>
<button onclick="menu('tugas')">Tugas</button>
<button onclick="menu('shop')">Shop</button>
<button onclick="menu('setting')">Setting</button>
</div>

<!-- PROFIL -->
<div id="profil">
<div class="card">
<h2>Saldo</h2>
<div class="balance" id="saldoText"></div>
</div>

<div class="card">
<button onclick="bukaDeposit()">Deposit</button>
<button onclick="logout()">Logout</button>
</div>
</div>

<!-- TUGAS -->
<div id="tugas" style="display:none;">
<div class="card">
<div class="grid">
<button onclick="tugasKlik(5000)">+5000</button>
<button onclick="tugasKlik(10000)">+10000</button>
<button onclick="tugasKlik(15000)">+15000</button>
<button onclick="tugasKlik(20000)">+20000</button>
</div>
</div>
</div>

<!-- SHOP -->
<div id="shop" style="display:none;">
<div class="card">
<div class="grid">

<div class="product">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<button onclick="beli()">Beli</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d">
<button onclick="beli()">Beli</button>
</div>

</div>
</div>
</div>

<!-- SETTING -->
<div id="setting" style="display:none;">
<div class="card">
<input type="text" id="namaBaru" placeholder="Nama Rekening">
<input type="text" id="rekBaru" placeholder="No Rekening">
<input type="password" id="passBaru" placeholder="Password Baru">
<button onclick="simpanSetting()">Simpan</button>
</div>
</div>

</div>

<!-- DEPOSIT -->
<div id="depositBox" class="popup">
<div class="box">
<input type="number" id="jumlah" placeholder="Jumlah">
<input type="text" placeholder="No Rekening">
<input type="text" placeholder="Nama Rekening">
<button onclick="kirimDeposit()">Kirim</button>
<button onclick="tutupDeposit()">Tutup</button>
</div>
</div>

<script>

// DATA
let saldo = localStorage.getItem("saldo") || 0;

// UPDATE
function updateSaldo(){
document.getElementById("saldoText").innerText="Rp "+Number(saldo).toLocaleString();
}
updateSaldo();

// LOGIN
function login(){
if(user.value=="admin" && pass.value=="1234"){
loginPage.style.display="none";
app.style.display="block";
updateSaldo();
}
}

// LOGOUT
function logout(){location.reload();}

// MENU
function menu(n){
profil.style.display="none";
tugas.style.display="none";
shop.style.display="none";
setting.style.display="none";

document.getElementById(n).style.display="block";
}

// TUGAS
function tugasKlik(uang){
saldo = Number(saldo) + uang;
localStorage.setItem("saldo",saldo);
updateSaldo();
}

// DEPOSIT
function bukaDeposit(){
depositBox.style.display="flex";
}
function tutupDeposit(){
depositBox.style.display="none";
}
function kirimDeposit(){
let j = Number(jumlah.value);
saldo += j;
localStorage.setItem("saldo",saldo);
updateSaldo();
tutupDeposit();
}

// SHOP
function beli(){
window.location.href="https://shopee.co.id";
}

// SETTING
function simpanSetting(){
alert("Data tersimpan");
}

</script>

</body>
</html>
